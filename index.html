    </script>
    <script>
      (() => {
        const STORAGE_KEY = "idiomMemoryMarks.ipad.v1";
        const state = {
          idioms: window.IDIOMS_DATA || [],
          marks: loadMarks(),
          revealed: new Set(),
          filtered: [],
          activeKey: null,
          longPressTimer: null,
          touchMoved: false,
        };

        const toolbar = document.getElementById("toolbar");
        const body = document.getElementById("idiomBody");
        const searchInput = document.getElementById("searchInput");
        const colorFilter = document.getElementById("colorFilter");
        const stats = document.getElementById("stats");
        const markMenu = document.getElementById("markMenu");

        document.getElementById("showAllBtn").addEventListener("click", () => {
          state.idioms.forEach((idiom) => state.revealed.add(getKey(idiom)));
          renderRows();
        });

        document.getElementById("hideAllBtn").addEventListener("click", () => {
          state.revealed.clear();
          renderRows();
        });

        searchInput.addEventListener("input", render);
        colorFilter.addEventListener("change", render);
        window.addEventListener("resize", () => {
          updateHeaderOffset();
          closeMenu();
        });

        document.addEventListener("click", (event) => {
          if (!markMenu.contains(event.target)) closeMenu();
        });

        markMenu.addEventListener("click", (event) => {
          const button = event.target.closest("button[data-color]");
          if (!button || !state.activeKey) return;

          const color = button.dataset.color;
          if (color === "clear") {
            delete state.marks[state.activeKey];
          } else {
            state.marks[state.activeKey] = color;
          }
          saveMarks();
          closeMenu();
          render();
        });

        updateHeaderOffset();
        render();

        function render() {
          const query = searchInput.value.trim().toLowerCase();
          const filter = colorFilter.value;
          state.filtered = state.idioms.filter((idiom) => {
            const key = getKey(idiom);
            const mark = state.marks[key] || "";
            const matchSearch = !query || String(idiom.word || "").toLowerCase().includes(query);
            const matchColor =
              filter === "all" ||
              (filter === "unmarked" && !mark) ||
              mark === filter;
            return matchSearch && matchColor;
          });

          renderRows();
          renderStats();
        }

        function renderRows() {
          body.innerHTML = "";
          if (!state.filtered.length) {
            body.innerHTML = '<tr><td colspan="3" class="empty-cell">没有匹配结果</td></tr>';
            return;
          }

          const fragment = document.createDocumentFragment();
          for (const idiom of state.filtered) {
            const key = getKey(idiom);
            const row = document.createElement("tr");

            const idCell = document.createElement("td");
            idCell.textContent = idiom.id;

            const wordCell = document.createElement("td");
            wordCell.className = "word-cell";
            wordCell.textContent = idiom.word;
            const mark = state.marks[key];
            if (mark) wordCell.classList.add(`mark-${mark}`);
            bindMarkEvents(wordCell, key);

            const meaningCell = document.createElement("td");
            meaningCell.className = `meaning-cell ${state.revealed.has(key) ? "is-visible" : "is-hidden"}`;
            if (state.revealed.has(key)) meaningCell.textContent = idiom.meaning || "";
            meaningCell.addEventListener("click", () => {
              toggleMeaning(key);
              renderRows();
            });

            row.append(idCell, wordCell, meaningCell);
            fragment.appendChild(row);
          }
          body.appendChild(fragment);
        }

        function renderStats() {
          const counts = { yellow: 0, red: 0, green: 0, blue: 0 };
          let marked = 0;
          for (const idiom of state.idioms) {
            const mark = state.marks[getKey(idiom)];
            if (mark && counts[mark] !== undefined) {
              marked += 1;
              counts[mark] += 1;
            }
          }
          stats.innerHTML = [
            `总数：${state.idioms.length}`,
            `当前显示：${state.filtered.length}`,
            `已标记：${marked}`,
            `易错：${counts.red}`,
            `已掌握：${counts.green}`,
            `重点：${counts.yellow}`,
            `待复习：${counts.blue}`,
          ].map((item) => `<span>${item}</span>`).join("");
        }

        function bindMarkEvents(cell, key) {
          cell.addEventListener("click", (event) => {
            event.stopPropagation();
            openMenu(key, event.clientX, event.clientY);
          });

          cell.addEventListener("contextmenu", (event) => {
            event.preventDefault();
            openMenu(key, event.clientX, event.clientY);
          });

          cell.addEventListener("touchstart", (event) => {
            state.touchMoved = false;
            clearTimeout(state.longPressTimer);
            const touch = event.touches[0];
            state.longPressTimer = setTimeout(() => {
              if (!state.touchMoved) openMenu(key, touch.clientX, touch.clientY);
            }, 450);
          }, { passive: true });

          cell.addEventListener("touchmove", () => {
            state.touchMoved = true;
            clearTimeout(state.longPressTimer);
          }, { passive: true });

          cell.addEventListener("touchend", clearLongPress, { passive: true });
          cell.addEventListener("touchcancel", clearLongPress, { passive: true });
        }

        function openMenu(key, x, y) {
          state.activeKey = key;
          markMenu.hidden = false;
          markMenu.style.left = "0px";
          markMenu.style.top = "0px";

          const rect = markMenu.getBoundingClientRect();
          const left = Math.max(8, Math.min(x, window.innerWidth - rect.width - 8));
          const top = Math.max(8, Math.min(y, window.innerHeight - rect.height - 8));
          markMenu.style.left = `${left}px`;
          markMenu.style.top = `${top}px`;
        }

        function closeMenu() {
          markMenu.hidden = true;
          state.activeKey = null;
        }

        function clearLongPress() {
          clearTimeout(state.longPressTimer);
        }

        function toggleMeaning(key) {
          if (state.revealed.has(key)) {
            state.revealed.delete(key);
          } else {
            state.revealed.add(key);
          }
        }

        function getKey(idiom) {
          return `${idiom.id}:${idiom.word}`;
        }

        function updateHeaderOffset() {
          document.documentElement.style.setProperty("--toolbar-h", `${toolbar.offsetHeight}px`);
        }

        function loadMarks() {
          try {
            return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
          } catch (error) {
            return {};
          }
        }

        function saveMarks() {
          try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state.marks));
          } catch (error) {
            // iPad 文件模式如果禁用存储，就只在当前页面里保留标记。
          }
        }
      })();
    </script>
